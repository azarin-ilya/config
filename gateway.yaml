spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: pass
          uri: lb://pass
          predicates:
            - Path=/pass/**
          filters:
            - name: CircuitBreaker
              args:
                name: exampleServiceCommand
                fallbackUri: forward:/fallback
        - id: visitorControl
          uri: lb://visitorControl
          predicates:
            - Path=/visitorControl/**
          filters:
            - name: CircuitBreaker
              args:
                name: exampleServiceCommand
                fallbackUri: forward:/fallback

hystrix:
  command:
    fallbackcmd:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 4000
